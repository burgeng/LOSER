<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Google Maps API Test</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    #topbar {
      height: 100px;
      padding: 10px;
      box-sizing: border-box;
      background: #f3f3f3;
      border-bottom: 1px solid #ccc;
      position: relative;
    }
    #clearPointsButton {
      position: absolute;
      top: 10px;
      right: 10px;
    }
    #map {
      height: calc(100% - 100px);
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <div id="statusText">Select point 1</div>
    <div id="point1"> Selected point 1:</div>
    <div id="point2"> Selected point 2:</div>
    <button id="clearPointsButton">Clear Selected Points</button>
  </div>

  <div id="map"></div>

  <script src="app.js"></script>
  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBVVih2K4xSjL_S0YT5sTXJuBKpjKi_MxY&callback=initMap">
  </script>
</body>
</html>
